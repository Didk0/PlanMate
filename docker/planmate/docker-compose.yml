networks:
  planmate-network:
    driver: bridge

services:
  db:
    image: postgres:15
    container_name: planmate-db
    restart: always
    environment:
      POSTGRES_DB: planmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init/01-keycloak-schema.sql:/docker-entrypoint-initdb.d/01-keycloak-schema.sql:ro
    networks:
      - planmate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: planmate-redis
    restart: always
    ports:
      - "6380:6379"
    networks:
      - planmate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    container_name: planmate-keycloak
    restart: always
    image: quay.io/keycloak/keycloak:26.1.0
    ports:
      - "9090:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/planmate?currentSchema=keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HEALTH_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/planmate-realm.json:/opt/keycloak/data/import/planmate-realm.json:ro
    command:
      - start-dev
      - --import-realm
    depends_on:
      db:
        condition: service_healthy
    networks:
      - planmate-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  backend:
    build:
      context: ../../backend
      dockerfile: docker/Dockerfile
    container_name: planmate-backend
    restart: always
    env_file:
      - ../../backend/backend.env
    environment:
      DATASOURCE_URL: jdbc:postgresql://db:5432/planmate?currentSchema=planmate
      REDIS_HOST: redis
      JWT_ISSUER_URI: http://localhost:9090/realms/planmate
      JWK_SET_URI: http://keycloak:8080/realms/planmate/protocol/openid-connect/certs
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - planmate-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: docker/Dockerfile
      args:
        VITE_KEYCLOAK_URL: "http://localhost:9090"
        VITE_BACK_END_URL: "http://localhost:8080"
        VITE_WS_URL: "http://localhost:8080/ws"
    container_name: planmate-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
      - keycloak
    networks:
      - planmate-network

volumes:
  db-data:
  keycloak_data:
