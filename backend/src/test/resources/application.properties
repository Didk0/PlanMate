spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS planmate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.cache.type=simple

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/planmate/protocol/openid-connect/certs

jwt.auth.converter.resource-id=planmate-client
jwt.auth.converter.principle-attribute=principal_username

keycloak.auth-server-url=http://localhost:9090
keycloak.realm=planmate
keycloak.client-id=planmate-client
keycloak.client-secret=test-secret
keycloak.scope=openid

frontend.url=http://localhost:5173
